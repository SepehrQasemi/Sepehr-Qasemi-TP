<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="meta.title">HubSpot Assignment - Sepehr Portfolio</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .tp-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .tp-figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface);
    }

    .tp-caption {
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 960px) {
      .tp-gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="hubspot-pack">
<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="../../../index.html">
      <span class="brand-mark" aria-hidden="true"></span>
      Sepehr Portfolio
    </a>
    <div class="nav-controls">
      <nav class="nav-links" aria-label="Main navigation" data-i18n-attr="aria-label:nav.mainNavigation">
        <a href="../../../index.html" data-i18n="nav.home">Home</a>
        <a href="../../../projects.html" data-i18n="nav.projects">Projects</a>
        <a class="active" href="../../../work.html" data-i18n="nav.work">Work</a>
        <a href="../../../certificates.html" data-i18n="nav.certificates">Certificates</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Switch language" data-i18n-attr="aria-label:languageSwitcher">
        <span class="lang-switch-label" data-i18n="language">Language</span>
        <button class="lang-btn active" type="button" data-lang="en" aria-pressed="true">EN</button>
        <button class="lang-btn" type="button" data-lang="fr" aria-pressed="false">FR</button>
      </div>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <p class="eyebrow" data-i18n="hero.eyebrow">Course Deliverable</p>
    <h1 data-i18n="hero.title">HubSpot Discovery Assignment</h1>
    <p data-i18n="hero.intro">Screenshot sequence and short analysis from the practical CRM exercise.</p>
    <div class="btn-row">
      <a class="btn" href="../../../work.html" data-i18n="buttons.backToWork">Back to Work</a>
      <a class="btn btn-primary" href="Analyse du TP.pdf" target="_blank" rel="noopener" data-i18n="buttons.openAnalysisPdf">Open Analysis PDF</a>
    </div>
  </section>

  <section class="section">
    <h2 data-i18n="screenshots.title">Screenshots</h2>
    <div class="tp-gallery">
      <figure class="tp-figure"><img src="1.png" alt="HubSpot screenshot 1" data-i18n-attr="alt:screenshots.shot1Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot1">Screenshot 1</figcaption></figure>
      <figure class="tp-figure"><img src="2.png" alt="HubSpot screenshot 2" data-i18n-attr="alt:screenshots.shot2Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot2">Screenshot 2</figcaption></figure>
      <figure class="tp-figure"><img src="3.png" alt="HubSpot screenshot 3" data-i18n-attr="alt:screenshots.shot3Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot3">Screenshot 3</figcaption></figure>
      <figure class="tp-figure"><img src="4.png" alt="HubSpot screenshot 4" data-i18n-attr="alt:screenshots.shot4Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot4">Screenshot 4</figcaption></figure>
      <figure class="tp-figure"><img src="5.png" alt="HubSpot screenshot 5" data-i18n-attr="alt:screenshots.shot5Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot5">Screenshot 5</figcaption></figure>
      <figure class="tp-figure"><img src="6.png" alt="HubSpot screenshot 6" data-i18n-attr="alt:screenshots.shot6Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot6">Screenshot 6</figcaption></figure>
      <figure class="tp-figure"><img src="7.png" alt="HubSpot screenshot 7" data-i18n-attr="alt:screenshots.shot7Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot7">Screenshot 7</figcaption></figure>
      <figure class="tp-figure"><img src="8.png" alt="HubSpot screenshot 8" data-i18n-attr="alt:screenshots.shot8Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot8">Screenshot 8</figcaption></figure>
      <figure class="tp-figure"><img src="9.png" alt="HubSpot screenshot 9" data-i18n-attr="alt:screenshots.shot9Alt" /><figcaption class="tp-caption" data-i18n="screenshots.shot9">Screenshot 9</figcaption></figure>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    &copy; <span id="year"></span> Sepehr Qasemi |
    <a href="https://github.com/SepehrQasemi/Portfolio" target="_blank" rel="noopener" data-i18n="footer.repo">Portfolio Repository</a>
  </div>
</footer>
<script src="../../js/i18n.js" defer></script>
</body>
</html>
